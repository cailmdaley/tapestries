      @font-face {

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --font-main: 'EB Garamond', Garamond, serif;
        --font-mono: 'JetBrains Mono', monospace;
        --bg-primary: #C8B8A8;
        --bg-card: #EDE8E0;
        --bg-elevated: #FDFCFA;
        --text-primary: #2E2A26;
        --text-secondary: #4A4540;
        --text-muted: #7A7368;
        --border: #A89888;
        --border-light: #C8BBA8;
        --accent: #5A7B7B;
        --gold: #9A7B35;
        --gold-light: #C4A86A;
        --green: #6B8B6B;
        --red: #A87070;

        --parchment-base: #D8CBBA;
        --parchment-light: #E5D9C8;
        --parchment-dark: #C9BAA5;
        --parchment-edge: #BBA890;
        --ink-dark: #2A2520;
        --ink-body: #3D3630;
        --ink-light: #5A524A;
        --ink-faded: #7A7068;
        --sepia-accent: #8A6B2A;
        --sepia-muted: #A08858;
        --verdigris: #4A6258;
        --rust: #8A5548;
        --ui-dark: var(--parchment-base);
        --ui-dark-elevated: var(--parchment-light);
        --ui-dark-surface: var(--parchment-dark);
        --ui-border: #B8A890;
        --ui-border-light: #C8B8A0;
        --ui-gold: var(--sepia-accent);
        --ui-gold-muted: var(--sepia-muted);
        --ui-text: var(--ink-body);
        --ui-text-secondary: var(--ink-light);
        --ui-text-muted: var(--ink-faded);
        --ui-accent: var(--verdigris);
        --ui-green: #5A6B50;
        --ui-red: var(--rust);
        --ui-purple: #6A5868;
        --ui-teal: var(--verdigris);
      }
      body {
        overflow: hidden;
        background: var(--ui-dark);
        font-family: var(--font-main);
      }

      /* ── Static overrides ── */
      .rhizome-view {
        position: fixed;
        inset: 0;
        background: var(--ui-dark);
        z-index: 1500;
        pointer-events: none;
        opacity: 0;
        transition: opacity 300ms ease;
      }
      .rhizome-view.visible {
        pointer-events: auto;
        opacity: 1;
      }

      .rhizome-close { display: none; }

      .rhizome-body {
        display: flex;
        position: absolute;
        inset: 0;
      }
      .rhizome-main {
        flex: 1;
        display: flex;
        min-width: 0;
      }
      .rhizome-dag-wrapper {
        flex: 1;
        position: relative;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .rhizome-dag {
        flex: 1;
        overflow: hidden;
        position: relative;
      }
      .rhizome-svg {
        display: block;
        width: 100%;
        height: 100%;
      }

      .rhizome-loading,
      .rhizome-empty {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: var(--ui-text-muted);
        font-family: var(--font-main);
        font-size: 1rem;
        font-style: italic;
      }
      .rhizome-loading {
        animation: subtlePulse 1.5s ease-in-out infinite;
        z-index: 5;
      }
      .rhizome-loading.error {
        color: var(--ui-red);
        animation: none;
        font-style: normal;
      }
      @keyframes subtlePulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }

      /* ── DAG nodes ── */
      .rhizome-node { cursor: grab; }
      .rhizome-node:hover path { filter: brightness(1.15); }
      .rhizome-node.selected path:first-child { stroke-width: 2.5 !important; }
      .rhizome-node.search-match path:first-child { stroke-width: 2.5 !important; filter: brightness(1.2); }
      .rhizome-node-label {
        font-family: var(--font-main);
        font-size: 14px;
        fill: var(--ui-text);
        pointer-events: none;
      }
      .rhizome-link {
        fill: none;
        transition: stroke-opacity 0.15s ease;
      }

      /* ── Search ── */
      .rhizome-search {
        padding: 0.5rem 1rem;
        border-top: 1px solid var(--ui-border);
        flex-shrink: 0;
      }
      .rhizome-search input {
        width: 100%;
        font-family: var(--font-main);
        font-size: 0.85rem;
        padding: 0.4rem 0.6rem;
        border: 1px solid var(--ui-border);
        border-radius: 3px;
        background: var(--ui-dark-surface);
        color: var(--ui-text);
      }
      .rhizome-search input:focus { outline: none; border-color: var(--ui-teal); }
      .rhizome-search input::placeholder { color: var(--ui-text-muted); font-style: italic; }
      .rhizome-search-results { margin-top: 0.4rem; max-height: 120px; overflow-y: auto; }
      .rhizome-search-results .search-result {
        padding: 0.3rem 0.4rem;
        font-size: 0.8rem;
        cursor: pointer;
        border-radius: 2px;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--ui-text);
        font-family: var(--font-main);
      }
      .rhizome-search-results .search-result:hover { background: var(--ui-dark-surface); }
      .rhizome-search-results .search-result-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
      .rhizome-search-results .search-result-name { font-style: normal; }
      .rhizome-search-results .search-result-match {
        font-family: var(--font-mono);
        font-size: 0.7rem;
        color: var(--ui-text-muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .rhizome-search-results .search-no-results {
        font-size: 0.8rem;
        color: var(--ui-text-muted);
        font-style: italic;
        padding: 0.2rem 0;
      }

      /* ── Detail panel ── */
      .rhizome-detail {
        width: 420px;
        flex-shrink: 0;
        border-left: 1px solid var(--ui-border);
        background: var(--ui-dark-elevated);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }
      .rhizome-detail.hidden { width: 0 !important; opacity: 0; border: none; overflow: hidden; }
      .rhizome-detail-resize {
        position: absolute; left: 0; top: 0; bottom: 0;
        width: 4px; cursor: col-resize; z-index: 10; background: transparent;
      }
      .rhizome-detail-resize:hover, .rhizome-detail-resize:active { background: var(--accent-gold); opacity: 0.4; }
      .rhizome-detail-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 0.6rem 0.8rem; border-bottom: 1px solid var(--ui-border); flex-shrink: 0;
      }
      .rhizome-detail-title { display: flex; align-items: center; gap: 0.4rem; min-width: 0; }
      .staleness-badge { font-size: 0.85rem; flex-shrink: 0; }
      .detail-name {
        font-family: var(--font-mono); font-size: 0.85rem; font-weight: 500;
        color: var(--ui-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .detail-status {
        font-family: var(--font-mono); font-size: 0.65rem; text-transform: uppercase;
        letter-spacing: 0.05em; padding: 0.15rem 0.4rem; border-radius: 2px;
        background: var(--ui-dark-surface); color: var(--ui-text-muted); flex-shrink: 0;
      }
      .rhizome-detail-close {
        background: none; border: none; color: var(--ui-text-muted);
        font-size: 1.2rem; cursor: pointer; padding: 0.1rem 0.3rem; line-height: 1; flex-shrink: 0;
      }
      .rhizome-detail-close:hover { color: var(--ui-text); }
      .rhizome-detail-content { flex: 1; overflow-y: auto; padding: 0.8rem; }

      /* Detail: graph */
      .rhizome-detail-graph { padding-bottom: 0.6rem; margin-bottom: 0.6rem; border-bottom: 1px solid var(--ui-border); }
      .rhizome-detail-graph-line { display: flex; flex-wrap: wrap; align-items: center; gap: 0.3rem; font-size: 0.8rem; padding: 0.15rem 0; }
      .rhizome-detail-graph-line .graph-label { color: var(--ui-text-muted); font-style: italic; font-family: var(--font-main); font-size: 0.75rem; min-width: 5.5em; }
      .dep-tag {
        font-family: var(--font-mono); font-size: 0.7rem;
        background: var(--ui-dark-surface); padding: 0.15rem 0.4rem;
        border-radius: 2px; border: 1px solid var(--ui-border);
        color: var(--ui-text-muted); cursor: pointer; transition: all 150ms;
      }
      .dep-tag:hover { border-color: var(--ui-teal); color: var(--ui-teal); }

      /* Detail: artifact viewer */
      .rhizome-artifact-viewer { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.8rem; }
      .rhizome-artifact { flex: 1; }
      .rhizome-artifact .artifact-label {
        display: block; font-family: var(--font-mono); font-size: 0.65rem;
        color: var(--ui-text-muted); margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.05em;
      }
      .rhizome-artifact img { width: 100%; border-radius: 2px; border: 1px solid var(--ui-border); cursor: pointer; transition: border-color 0.2s; }
      .rhizome-artifact img:hover { border-color: var(--ui-teal); }
      .rhizome-artifact-viewer .artifact-nav { font-size: 1.2rem; color: var(--ui-text-muted); cursor: pointer; padding: 0.4rem; user-select: none; }
      .rhizome-artifact-viewer .artifact-nav:hover { color: var(--ui-teal); }

      /* Detail: body (markdown) */
      .rhizome-detail-body { font-family: var(--font-main); font-size: 0.85rem; color: var(--ui-text); line-height: 1.6; margin-bottom: 0.8rem; }
      .rhizome-detail-body h1 { font-size: 1.1rem; margin: 0.8rem 0 0.4rem; }
      .rhizome-detail-body h2 { font-size: 0.95rem; margin: 0.6rem 0 0.3rem; color: var(--ui-gold); font-variant: small-caps; letter-spacing: 0.05em; }
      .rhizome-detail-body h3 { font-size: 0.85rem; margin: 0.5rem 0 0.2rem; }
      .rhizome-detail-body p { margin: 0.2rem 0; }
      .rhizome-detail-body ul { margin: 0.2rem 0 0.2rem 1rem; padding: 0; }
      .rhizome-detail-body li { margin: 0.1rem 0; }
      .rhizome-detail-body code { font-family: var(--font-mono); font-size: 0.8em; background: var(--ui-dark-surface); padding: 0.1rem 0.25rem; border-radius: 2px; }
      .config-resolved { color: var(--ui-teal); font-weight: 500; }
      .rhizome-detail-body pre { background: var(--ui-dark-surface); border: 1px solid var(--ui-border); border-radius: 3px; padding: 0.5rem 0.7rem; overflow-x: auto; margin: 0.4rem 0; }
      .rhizome-detail-body pre code { background: none; padding: 0; font-size: 0.78rem; line-height: 1.5; }
      .rhizome-detail-body blockquote { border-left: 2px solid var(--ui-teal); padding-left: 0.7rem; margin: 0.4rem 0; color: var(--ui-text-muted); font-style: italic; }
      .rhizome-detail-body a { color: var(--ui-teal); text-decoration: none; }
      .rhizome-detail-body a:hover { text-decoration: underline; }
      .rhizome-detail-body table { width: 100%; border-collapse: collapse; margin: 0.4rem 0; font-size: 0.8rem; }
      .rhizome-detail-body th, .rhizome-detail-body td { padding: 0.3rem 0.5rem; border: 1px solid var(--ui-border); text-align: left; }
      .rhizome-detail-body th { background: var(--ui-dark-surface); font-weight: 600; }

      /* Detail: evidence */
      .rhizome-evidence-section h3 {
        display: flex; align-items: center; gap: 0.4rem;
        font-family: var(--font-main); font-size: 0.85rem; font-weight: 600;
        font-variant: small-caps; letter-spacing: 0.08em;
        color: var(--ui-text-muted); cursor: pointer; margin: 0.6rem 0 0.3rem; user-select: none;
      }
      .rhizome-evidence-section h3:hover { color: var(--ui-text); }
      .rhizome-evidence-section .toggle-icon { font-size: 0.75rem; color: var(--ui-text-muted); }
      .evidence-container.collapsed { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
      .evidence-container:not(.collapsed) { max-height: 400px; overflow-y: auto; transition: max-height 0.3s ease-in; }
      .rhizome-evidence { background: var(--ui-dark-surface); border-radius: 2px; padding: 0.5rem; }
      .rhizome-evidence .evidence-item { display: flex; justify-content: space-between; padding: 0.2rem 0; font-size: 0.78rem; }
      .rhizome-evidence .evidence-key { font-family: var(--font-mono); color: var(--ui-text-muted); }
      .rhizome-evidence .evidence-value { font-family: var(--font-mono); color: var(--ui-text); }

      /* ── Annotation panel (hidden in static mode) ── */
      .rhizome-annotation-panel { display: none; }

      /* ── Lightbox ── */
      .rhizome-lightbox {
        position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9);
        z-index: 2000; display: flex; align-items: center; justify-content: center; cursor: pointer;
      }
      .rhizome-lightbox img { max-width: 95%; max-height: 95%; border-radius: 2px; }
      .rhizome-lightbox-close {
        position: absolute; top: 1.5rem; right: 1.5rem; background: none; border: none;
        color: rgba(255,255,255,0.7); font-size: 2rem; cursor: pointer; z-index: 2001;
      }
      .rhizome-lightbox-close:hover { color: white; }
      .rhizome-lightbox-label {
        position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
        font-family: var(--font-mono); font-size: 0.75rem; color: rgba(255, 255, 255, 0.6);
        background: rgba(0, 0, 0, 0.5); padding: 0.3rem 0.8rem; border-radius: 3px; pointer-events: none;
      }

      /* ── Toast ── */
      .portolan-toast {
        position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
        background: #1a1a1a; color: #f5f5f0; padding: 12px 20px; border-radius: 8px;
        display: flex; align-items: center; gap: 10px; font-family: var(--font-main);
        font-size: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 10000; opacity: 0;
        animation: toast-in 0.3s ease forwards;
      }
      @keyframes toast-in {
        from { opacity: 0; transform: translateX(-50%) translateY(100px); }
        to { opacity: 1; transform: translateX(-50%) translateY(0); }
      }
    </style>
